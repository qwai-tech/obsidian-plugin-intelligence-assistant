name: Build and Publish

on:
  push:
    branches: [main, master]
    tags: ['*']

permissions: {}

env:
  PLUGIN_NAME: intelligence-assistant
  MAIN_FILE: main.js
  STYLE_FILE: styles.css
  MANIFEST_FILE: manifest.json

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build plugin
      run: npm run build

    - name: Verify plugin files exist
      run: |
        if [ ! -f ${{ env.MAIN_FILE }} ]; then
          echo "Plugin main file not found!"
          ls -la
          exit 1
        fi

        if [ ! -f ${{ env.STYLE_FILE }} ]; then
          echo "Plugin style file not found!"
          exit 1
        fi

        if [ ! -f ${{ env.MANIFEST_FILE }} ]; then
          echo "Plugin manifest file not found!"
          exit 1
        fi

    - name: Create release directory
      run: |
        mkdir -p release
        cp ${{ env.MAIN_FILE }} ${{ env.STYLE_FILE }} ${{ env.MANIFEST_FILE }} release/

    - name: Package plugin as .zip
      working-directory: ./release
      run: zip -r ../${{ env.PLUGIN_NAME }}.zip ./*

    - name: Attest main.js
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: release/${{ env.MAIN_FILE }}

    - name: Attest styles.css
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: release/${{ env.STYLE_FILE }}

    - name: Attest manifest.json
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: release/${{ env.MANIFEST_FILE }}

    - name: Upload packaged plugin as artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PLUGIN_NAME }}-zip
        path: ${{ env.PLUGIN_NAME }}.zip

    - name: Upload plugin files artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PLUGIN_NAME }}-files
        path: |
          release/${{ env.MAIN_FILE }}
          release/${{ env.STYLE_FILE }}
          release/${{ env.MANIFEST_FILE }}

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ github.ref_name }}
        body: |
          ## Intelligence Assistant ${{ github.ref_name }}

          ### Installation
          Download and install via Obsidian's community plugins browser, or manually copy the files below to your vault's `.obsidian/plugins/intelligence-assistant/` folder.

          ### Release assets
          - `main.js` — plugin bundle
          - `styles.css` — plugin styles
          - `manifest.json` — plugin metadata
        files: |
          release/${{ env.MAIN_FILE }}
          release/${{ env.STYLE_FILE }}
          release/${{ env.MANIFEST_FILE }}
