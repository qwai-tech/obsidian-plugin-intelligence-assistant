name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag for release (e.g., v0.0.1)'
        required: true
        type: string
      release_title:
        description: 'Release title'
        required: true
        type: string
      is_prerelease:
        description: 'Is this a pre-release?'
        required: false
        type: boolean
        default: false
      release_notes:
        description: 'Release notes (optional)'
        required: false
        type: string

permissions: {}

env:
  PLUGIN_NAME: intelligence-assistant
  MAIN_FILE: main.js
  STYLE_FILE: styles.css
  MANIFEST_FILE: manifest.json

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build plugin
      run: npm run build

    - name: Verify plugin files exist
      run: |
        if [ ! -f ${{ env.MAIN_FILE }} ]; then
          echo "Plugin main file not found!"
          ls -la
          exit 1
        fi

        if [ ! -f ${{ env.STYLE_FILE }} ]; then
          echo "Plugin style file not found!"
          exit 1
        fi

        if [ ! -f ${{ env.MANIFEST_FILE }} ]; then
          echo "Plugin manifest file not found!"
          exit 1
        fi

    - name: Create release directory
      run: |
        mkdir -p release
        cp ${{ env.MAIN_FILE }} ${{ env.STYLE_FILE }} ${{ env.MANIFEST_FILE }} release/

    - name: Package plugin as .zip
      working-directory: ./release
      run: zip -r ../${{ env.PLUGIN_NAME }}.zip ./*

    - name: Attest main.js
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: release/${{ env.MAIN_FILE }}

    - name: Attest styles.css
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: release/${{ env.STYLE_FILE }}

    - name: Attest manifest.json
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: release/${{ env.MANIFEST_FILE }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.version_tag }}
        name: ${{ inputs.release_title }}
        body: ${{ inputs.release_notes }}
        prerelease: ${{ inputs.is_prerelease }}
        files: |
          release/${{ env.MAIN_FILE }}
          release/${{ env.STYLE_FILE }}
          release/${{ env.MANIFEST_FILE }}
