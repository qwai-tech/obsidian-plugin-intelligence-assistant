name: Verification Gate

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  gate:
    name: Deterministic Verification Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Obsidian API capability audit (no regressions)
        run: npm run audit:obsidian-api

      - name: Unit + mission + perf suite
        run: npm test

      - name: Flake-soak (determinism)
        run: npm run test:flake-soak

      - name: Memory-leak guard (forced GC)
        run: npm run test:perf:mem

  # Mutation testing runs serially (Stryker concurrency:1, fixed mock-LLM port)
  # and is much slower than the deterministic checks — kept in its own job with a
  # generous timeout so it never cancels the fast gate.
  mutation:
    name: Mutation Gate (agent orchestration core)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Mutation gate
        run: npm run test:mutation

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: tests/mutation/mutation-report.json
          if-no-files-found: ignore
